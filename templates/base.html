<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TalentLens AI™</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Inter:wght@100..900&family=Syne:wght@400..800&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #020810;
            --cyan: #00d4ff;
            --green: #00e87a;
            --card: rgba(10, 20, 35, 0.7);
            --border: rgba(0, 212, 255, 0.12);
            --text: #ffffff;
            --text2: #a0aab5;
            --text3: #607080;
        }

        * {
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            /* NO grid lines — clean dark background */
            background-image:
                radial-gradient(ellipse 70% 50% at 15% 10%, rgba(0, 212, 255, 0.05) 0%, transparent 60%),
                radial-gradient(ellipse 50% 40% at 85% 85%, rgba(100, 80, 200, 0.04) 0%, transparent 60%);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* subtle floating glow orbs */
        body::before {
            content: '';
            position: fixed;
            top: -150px;
            left: -150px;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 212, 255, 0.07) 0%, transparent 70%);
            z-index: 0;
            pointer-events: none;
            animation: orbA 20s ease-in-out infinite;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -200px;
            right: -100px;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 232, 122, 0.05) 0%, transparent 70%);
            z-index: 0;
            pointer-events: none;
            animation: orbB 25s ease-in-out infinite;
        }

        @keyframes orbA {

            0%,
            100% {
                transform: translate(0, 0);
            }

            50% {
                transform: translate(40px, 30px);
            }
        }

        @keyframes orbB {

            0%,
            100% {
                transform: translate(0, 0);
            }

            50% {
                transform: translate(-30px, -40px);
            }
        }

        h1,
        h2,
        h3,
        h4,
        .brand-logo {
            font-family: 'Syne', sans-serif;
        }

        .mono-text {
            font-family: 'DM Mono', monospace;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.2rem 3.5rem;
            background: rgba(2, 8, 16, 0.85);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(0, 212, 255, 0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .brand-logo {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .brand-logo span {
            color: var(--cyan);
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .nav-link {
            color: var(--text2);
            text-decoration: none;
            font-family: 'DM Mono', monospace;
            font-size: 0.85rem;
            transition: color 0.2s;
        }

        .nav-link:hover {
            color: var(--cyan);
        }

        .btn-primary {
            background: transparent;
            color: var(--cyan);
            border: 1px solid rgba(0, 212, 255, 0.5);
            padding: 0.55rem 1.4rem;
            border-radius: 6px;
            font-family: 'DM Mono', monospace;
            font-size: 0.85rem;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.25s ease;
            display: inline-block;
            text-align: center;
        }

        .btn-primary:hover {
            background: rgba(0, 212, 255, 0.08);
            border-color: var(--cyan);
            box-shadow: 0 0 18px rgba(0, 212, 255, 0.2);
        }

        .btn-solid {
            background: var(--cyan);
            color: var(--bg);
            border: none;
            padding: 0.75rem 1.8rem;
            border-radius: 8px;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.25s ease;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.25);
            display: inline-flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-solid:hover {
            background: #00e5ff;
            box-shadow: 0 0 32px rgba(0, 212, 255, 0.5);
            transform: translateY(-2px);
        }

        .container {
            flex: 1;
            padding: 2rem 3.5rem;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            position: relative;
            z-index: 1;
        }

        .card {
            background: rgba(4, 12, 26, 0.75);
            border: 1px solid rgba(0, 212, 255, 0.1);
            border-radius: 12px;
            padding: 2rem;
            backdrop-filter: blur(12px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .alerts {
            margin-bottom: 2rem;
        }

        .alert {
            padding: 1rem;
            border-radius: 6px;
            margin-bottom: 1rem;
            font-family: 'DM Mono', monospace;
            font-size: 0.85rem;
            border-left: 3px solid var(--cyan);
            background: rgba(0, 212, 255, 0.07);
        }

        .alert.error {
            border-left-color: #ff3366;
            background: rgba(255, 51, 102, 0.08);
            color: #ffb3c6;
        }

        .badge {
            display: inline-block;
            padding: 0.2rem 0.7rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            font-family: 'DM Mono', monospace;
            border: 1px solid;
            background: rgba(0, 0, 0, 0.3);
        }

        .badge.strong-fit {
            color: var(--green);
            border-color: var(--green);
        }

        .badge.moderate-fit {
            color: #ffd700;
            border-color: #ffd700;
        }

        .badge.not-fit {
            color: #ff3366;
            border-color: #ff3366;
        }

        .badge.low-risk {
            color: var(--green);
            border-color: var(--green);
        }

        .badge.moderate-risk {
            color: #ffd700;
            border-color: #ffd700;
        }

        .badge.high-risk {
            color: #ff3366;
            border-color: #ff3366;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-family: 'Inter', sans-serif;
            background: rgba(0, 0, 0, 0.15);
            border-radius: 8px;
            overflow: hidden;
        }

        th {
            text-align: left;
            padding: 0.9rem 1rem;
            background: rgba(0, 212, 255, 0.04);
            color: var(--cyan);
            font-family: 'DM Mono', monospace;
            font-size: 0.75rem;
            border-bottom: 1px solid rgba(0, 212, 255, 0.1);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        td {
            padding: 0.9rem 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            font-size: 0.9rem;
            color: var(--text2);
        }

        tr:hover td {
            background: rgba(0, 212, 255, 0.02);
            color: var(--text);
        }
    </style>
</head>

<body>
    <nav>
        <a href="/" class="brand-logo">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="#00d4ff" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round" />
                <path d="M2 17L12 22L22 17" stroke="#00e87a" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round" />
                <path d="M2 12L12 17L22 12" stroke="#00d4ff" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round" />
            </svg>
            TalentLens<span>_AI</span>
        </a>
        <div class="nav-links">
            <a href="/" class="nav-link">Home</a>
            <a href="/dashboard" class="nav-link">Dashboard</a>
            <a href="/evaluate" class="btn-primary">Evaluate Resume</a>
        </div>
    </nav>

    <div class="container">
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        <div class="alerts">
            {% for category, message in messages %}
            <div class="alert {{ category }}">{{ message }}</div>
            {% endfor %}
        </div>
        {% endif %}
        {% endwith %}
        {% block content %}{% endblock %}
    </div>
</body>

</html>
